[variables]
NIXPACKS_PHP_VERSION = '8.2'

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts", "npm install"]

[phases.build]
cmds = [
  "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache",
  "chmod -R 775 storage bootstrap/cache",
  "sed -i 's/(int) $this->port()/(int) $this->port() + 0/g' vendor/laravel/framework/src/Illuminate/Foundation/Console/ServeCommand.php || true",
  "php artisan storage:link",
  "php artisan package:discover --ansi",
  "npm run production"
]




[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:$PORT server.php"
