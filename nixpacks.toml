[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.json", "php84Extensions.bcmath", "php84Extensions.gd", "php84Extensions.curl", "php84Extensions.fileinfo", "php84Extensions.openssl", "caddy"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "chmod -R 775 storage bootstrap/cache && php artisan migrate --force && { php-fpm -y /etc/php-fpm.conf & sleep 2; caddy run --config /app/Caddyfile 2>&1; }"
