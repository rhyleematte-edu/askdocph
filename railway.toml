[build]
builder = "dockerfile"

[deploy]
startCommand = "php artisan serve --host=0.0.0.0 --port=$PORT"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[variables]
PHP_VERSION = "8.4"
PORT = "8080"
ASSET_URL = "https://askdocph-production-4dca.up.railway.app"
